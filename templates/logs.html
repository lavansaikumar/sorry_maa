<!DOCTYPE html>
<html>
<head>
  <title>Logs</title>
</head>
<body>
  <h1>Interaction Logs</h1>
  <table border="1">
    <tr><th>ID</th><th>Time</th><th>Location</th><th>Action</th></tr>
    {% for log in logs %}
    <tr>
      <td>{{ log[0] }}</td>
      <td>{{ log[1] }}</td>
      <td>{{ log[2] }}</td>
      <td>{{ log[3] }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
